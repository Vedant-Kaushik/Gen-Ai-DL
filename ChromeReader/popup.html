<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Web QA</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="chat-wrapper">
      <div class="chat-row input">
        <input
          id="question"
          type="text"
          placeholder="Ask a question about this page..."
          autofocus
        />
      </div>
      <div id="chat-output" class="chat-row output"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
